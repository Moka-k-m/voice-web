name: 24/7 TTS Server

on:
  schedule:
    # يعمل كل 5 ساعات و 55 دقيقة
    - cron: '55 */5 * * *'
  workflow_dispatch:

jobs:
  run-server:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repo
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install fastapi uvicorn edge-tts pyngrok
        sudo apt-get update && sudo apt-get install -y ffmpeg

    - name: Run Server
      env:
        NGROK_AUTH_TOKEN: ${{ secrets.NGROK_AUTH_TOKEN }}
      run: |
        # تشغيل ملف main.py
        nohup python main.py > log.txt 2>&1 &
        
        # انتظار 15 ثانية لبدء التشغيل
        sleep 15
        
        # طباعة السجلات للتأكد من العمل
        echo "--- SERVER LOGS ---"
        cat log.txt
        
        # البقاء في حالة انتظار للحفاظ على الحاوية تعمل
        sleep 21000
