name: Run TTS Server

on:
  schedule:
    # يعمل كل 6 ساعات (لإعادة تشغيل السيرفر قبل انتهاء المهلة)
    - cron: '0 */6 * * *'
  workflow_dispatch: # لتشغيله يدوياً من زر Actions

jobs:
  run-server:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repo
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        # تثبيت ffmpeg ضروري لبعض العمليات الصوتية
        sudo apt-get update && sudo apt-get install -y ffmpeg

    - name: Run Server
      env:
        # يجب إضافة هذا الـ Token في إعدادات المستودع (Settings > Secrets)
        # احصل عليه من موقع ngrok.com
        NGROK_AUTH_TOKEN: ${{ secrets.NGROK_AUTH_TOKEN }}
      run: |
        # تشغيل السكريبت
        python bot.py
